name: Server Operations

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - restart
          - nuke-db
          - status
          - logs

jobs:
  operate:
    runs-on: ubuntu-latest
    outputs:
      action: ${{ github.event.inputs.action || 'deploy' }}
    
    steps:
      - name: Perform action
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            export PATH=$HOME/bin/node/bin:$PATH
            cd /var/www/vr.chorecraft.net/app
            
            ACTION="${{ github.event.inputs.action || 'deploy' }}"
            echo "Performing action: $ACTION"
            
            case "$ACTION" in
              deploy)
                echo "=== Deploying latest code ==="
                git fetch origin
                git reset --hard origin/main
                npm ci
                npm run build
                sudo systemctl restart voice-relay
                echo "Deployed successfully at $(date)"
                ;;
              restart)
                echo "=== Restarting service ==="
                sudo systemctl restart voice-relay
                echo "Restarted at $(date)"
                ;;
              nuke-db)
                echo "=== Nuking database ==="
                sudo systemctl stop voice-relay
                rm -rf /var/www/vr.chorecraft.net/app/data/*
                sudo systemctl start voice-relay
                echo "Database nuked and service restarted at $(date)"
                ;;
              status)
                echo "=== Service status ==="
                sudo systemctl status voice-relay || true
                ;;
              logs)
                echo "=== Recent logs ==="
                journalctl -u voice-relay -n 100 --no-pager
                ;;
              *)
                echo "Unknown action: $ACTION"
                exit 1
                ;;
            esac

  smoke-tests:
    runs-on: ubuntu-latest
    needs: operate
    # Only run smoke tests after deploy or restart
    if: contains(fromJSON('["deploy", "restart"]'), needs.operate.outputs.action)
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright
        run: npx playwright install chromium
      
      - name: Wait for server to be ready
        run: |
          echo "Waiting for server to be ready..."
          for i in {1..30}; do
            if curl -s https://vr.chorecraft.net/health | grep -q '"status":"ok"'; then
              echo "Server is ready!"
              exit 0
            fi
            echo "Attempt $i/30 - waiting..."
            sleep 2
          done
          echo "Server did not become ready in time"
          exit 1
      
      - name: Run smoke tests
        env:
          SMOKE_TEST_URL: https://vr.chorecraft.net
          TEST_AUTH_SECRET: ${{ secrets.TEST_AUTH_SECRET }}
        run: npm run smoke
      
      - name: Upload smoke test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7

  tag-success:
    runs-on: ubuntu-latest
    needs: [operate, smoke-tests]
    if: success() && needs.operate.outputs.action == 'deploy'
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Create success tag
        run: |
          git config user.name "openhands"
          git config user.email "openhands@all-hands.dev"
          TAG="deploy-success-${{ github.sha }}"
          git tag "$TAG"
          git push origin "$TAG"

  handle-failure:
    runs-on: ubuntu-latest
    needs: [operate, smoke-tests]
    if: failure() && needs.operate.outputs.action == 'deploy'
    permissions:
      contents: write
      issues: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      
      - name: Find last known good commit
        id: find-good
        run: |
          LAST_GOOD=$(git tag -l 'deploy-success-*' --sort=-creatordate | head -1 | sed 's/deploy-success-//')
          if [ -z "$LAST_GOOD" ]; then
            echo "No previous successful deployment found"
            echo "has_rollback_target=false" >> "$GITHUB_OUTPUT"
          elif ! git rev-parse --verify "$LAST_GOOD" >/dev/null 2>&1; then
            echo "Found tag but commit $LAST_GOOD is invalid - skipping rollback"
            echo "has_rollback_target=false" >> "$GITHUB_OUTPUT"
          else
            echo "Last good commit: $LAST_GOOD"
            echo "has_rollback_target=true" >> "$GITHUB_OUTPUT"
            echo "commit=$LAST_GOOD" >> "$GITHUB_OUTPUT"
          fi
      
      - name: Ensure labels exist
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: 'ci-failure', color: 'd73a4a', description: 'Automated issue from CI failure' },
              { name: 'critical', color: 'b60205', description: 'Critical issue requiring immediate attention' }
            ];
            
            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name
                });
              } catch (e) {
                if (e.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label.name,
                    color: label.color,
                    description: label.description
                  });
                }
              }
            }
      
      - name: Create failure issue
        id: create-issue
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const hasRollback = '${{ steps.find-good.outputs.has_rollback_target }}' === 'true';
            const rollbackCommit = '${{ steps.find-good.outputs.commit }}';

            const body = `## 🚨 Smoke Test Failure

            **Failed Commit:** \`${{ github.sha }}\`
            **Workflow Run:** [View logs](${runUrl})
            **Triggered By:** ${context.actor}

            ### Status
            ${hasRollback ? `🔄 **Automatic rollback initiated** to commit \`${rollbackCommit}\`` : '⚠️ **No previous successful deployment found** - manual intervention required'}

            ### Next Steps
            1. Review the [workflow logs](${runUrl}) to identify the failure
            2. Check the [smoke test artifacts](${runUrl}#artifacts) for screenshots
            3. Create a fix PR and ensure CI passes before merging

            ---
            *This issue was automatically created by CI on smoke test failure.*`;

            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Smoke test failure after deployment',
              body: body,
              labels: ['ci-failure']
            });

            core.setOutput('issue_number', issue.number);
      
      # NOTE: This rollback assumes stateless deployments. If the failed deployment
      # included database migrations or server-side config changes, the rollback may
      # create version mismatches. For stateful changes, manual intervention is required.
      - name: Rollback deployment
        id: rollback
        if: steps.find-good.outputs.has_rollback_target == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e  # Exit on first error
            export PATH=$HOME/bin/node/bin:$PATH
            cd /var/www/vr.chorecraft.net/app
            echo "=== Rolling back to ${{ steps.find-good.outputs.commit }} ==="
            git fetch origin
            git checkout ${{ steps.find-good.outputs.commit }}
            npm ci
            npm run build
            sudo systemctl restart voice-relay
            echo "Rollback completed at $(date)"
      
      - name: Verify rollback (health check)
        id: verify-rollback
        if: steps.find-good.outputs.has_rollback_target == 'true'
        run: |
          echo "Waiting for server to be ready after rollback..."
          for i in {1..30}; do
            if curl -s https://vr.chorecraft.net/health | grep -q '"status":"ok"'; then
              echo "Server is healthy after rollback!"
              echo "rollback_success=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Attempt $i/30 - waiting..."
            sleep 2
          done
          echo "Server did not recover after rollback"
          echo "rollback_success=false" >> "$GITHUB_OUTPUT"
          exit 1
      
      - name: Update issue on rollback failure
        if: failure() && steps.find-good.outputs.has_rollback_target == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = ${{ steps.create-issue.outputs.issue_number }};
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `## ⚠️ Rollback Failed

            The automatic rollback to commit \`${{ steps.find-good.outputs.commit }}\` did not restore the service.

            **Manual intervention required immediately.**

            The rollback deployment completed but the health check failed. This could indicate:
            - Database migration incompatibility
            - External dependency issues
            - Infrastructure problems

            ---
            *No further automatic retry will be attempted to prevent infinite loops.*`
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['critical']
            });
