name: Nightly Slow E2E

# Runs Playwright specs tagged @slow-keepalive (issue #310). These specs
# include a real-time 5-minute idle window and are deliberately excluded
# from the PR CI run (.github/workflows/ci.yml) so they don't burn 5+ min
# of CI time on every push.
#
# Schedule: 07:00 UTC daily. Can also be dispatched manually from the
# Actions tab via the workflow_dispatch entry below.

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-slow-e2e
  cancel-in-progress: false

jobs:
  slow-keepalive:
    name: Slow keepalive E2E
    runs-on: ubuntu-latest
    # Hard cap: ~5 min idle + auth/assert overhead per test, two tests, plus
    # server boot. 25 min gives headroom for occasional CI sluggishness.
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build client
        run: npm run build -w client

      - name: Run slow keepalive E2E
        env:
          TEST_AUTH_SECRET: ${{ secrets.TEST_AUTH_SECRET }}
          # Single worker — the 5-min idle test is wall-clock-bound, not
          # CPU-bound, so parallelism just burns more CI infra for no gain.
          PLAYWRIGHT_WORKERS: '1'
          CLEANUP_TEST_DBS: 'true'
        run: npx playwright test --project=slow-keepalive

      - name: Cleanup test processes
        if: always()
        run: |
          pkill -f "tsx watch src/index.ts" || true
          pkill -f "vite --port 51[0-9][0-9]" || true
          pkill -f "vite --port 52[0-9][0-9]" || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-slow-keepalive
          path: playwright-report/
          retention-days: 14
