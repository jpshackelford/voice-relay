name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test-server:
    name: Server Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run server tests
        run: npm run test -w server

      - name: Run server tests with coverage
        run: npm run test:coverage -w server

  build-client:
    name: Build Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build client
        run: npm run build -w client

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build-client]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (chromium)
        id: e2e-chromium
        continue-on-error: true
        env:
          TEST_AUTH_SECRET: ${{ secrets.TEST_AUTH_SECRET }}
          PLAYWRIGHT_WORKERS: '4'
          CLEANUP_TEST_DBS: 'true'
        run: npx playwright test --project=chromium

      - name: Run Mobile Voice E2E tests
        id: e2e-mobile
        env:
          TEST_AUTH_SECRET: ${{ secrets.TEST_AUTH_SECRET }}
        # Add --retries=2 for flaky WebSocket tests (GitHub Issue #192)
        run: npm run test:mobile -- --retries=2

      - name: Cleanup test processes
        if: always()
        run: |
          # Kill any orphan test server processes (all worker ports)
          pkill -f "tsx watch src/index.ts" || true
          pkill -f "vite --port 51[0-9][0-9]" || true
          pkill -f "vite --port 52[0-9][0-9]" || true

      - name: Check E2E test results
        if: steps.e2e-chromium.outcome == 'failure' || steps.e2e-mobile.outcome == 'failure'
        run: |
          echo "E2E tests failed"
          echo "Chromium: ${{ steps.e2e-chromium.outcome }}"
          echo "Mobile: ${{ steps.e2e-mobile.outcome }}"
          exit 1

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
