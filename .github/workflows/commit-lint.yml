name: Conventional Commits

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  lint-pr-title:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title follows conventional commits
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Require conventional commit format for PR titles
          # PR title becomes the merge commit message when squash merging
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          # Require a scope (optional)
          requireScope: false
          # Scopes allowed for voice-relay
          scopes: |
            client
            server
            websocket
            auth
            db
            tests
            e2e
            deps
            ci
          # Ensure subject doesn't start with uppercase
          subjectPattern: ^[a-z].+$
          subjectPatternError: |
            The subject "{subject}" should start with a lowercase letter.

            Example: "feat: add speech-to-text support"
          # Validate the entire PR title
          validateSingleCommit: false
